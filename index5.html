<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Flip Viewer</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0d0d0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { min-height: 100vh; display: flex; flex-direction: column; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px;
      background: #161618;
      border-bottom: 1px solid #252529;
    }

    .toolbar input,
    .toolbar button {
      border-radius: 14px;
      border: 1px solid #37373c;
      font-size: 15px;
    }

    .toolbar input[type="text"],
    .toolbar input[type="number"] {
      background: #1d1d21;
      color: #fff;
      padding: 12px 14px;
      outline: none;
    }

    .toolbar input[type="text"] {
      flex: 1;
      min-width: 260px;
    }

    .toolbar input[type="number"] {
      width: 96px;
    }

    .toolbar button {
      padding: 12px 16px;
      background: #fff;
      color: #111;
      font-weight: 700;
      cursor: pointer;
    }

    .toolbar button.secondary {
      background: #232328;
      color: #fff;
    }

    .status {
      padding: 10px 14px;
      color: #c8c8cb;
      border-bottom: 1px solid #1d1d20;
      background: #121214;
      font-size: 14px;
    }

    .viewer-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 14px 18px;
      overflow: auto;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.035), rgba(255,255,255,0) 42%),
        linear-gradient(to bottom, #0b0b0c, #080809);
    }

    .book {
      position: relative;
      perspective: 2200px;
    }

    .spread {
      display: flex;
      position: relative;
      gap: 0;
      box-shadow: 0 24px 64px rgba(0,0,0,0.48);
    }

    .page-shell {
      position: relative;
      width: min(42vw, 520px);
      aspect-ratio: 0.707 / 1;
      overflow: hidden;
      background: #fff;
      border: 1px solid #d9d9dd;
    }

    .page-shell.left {
      border-radius: 18px 0 0 18px;
    }

    .page-shell.right {
      border-radius: 0 18px 18px 0;
    }

    .page-layer {
      position: absolute;
      inset: 0;
      background: #fff;
      backface-visibility: hidden;
      transform-style: preserve-3d;
      will-change: transform, opacity, filter;
    }

    .page-layer canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
    }

    .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      background:
        linear-gradient(135deg, #f6f6f6 25%, #fbfbfb 25%, #fbfbfb 50%, #f6f6f6 50%, #f6f6f6 75%, #fbfbfb 75%, #fbfbfb 100%);
      background-size: 22px 22px;
    }

    .page-number {
      position: absolute;
      bottom: 10px;
      font-size: 12px;
      color: #666;
      background: rgba(255,255,255,0.86);
      border-radius: 999px;
      padding: 4px 8px;
    }

    .left .page-number { left: 10px; }
    .right .page-number { right: 10px; }

    .gutter {
      position: absolute;
      left: 50%;
      top: 0;
      width: 6px;
      height: 100%;
      transform: translateX(-50%);
      background: linear-gradient(to right, rgba(0,0,0,0.04), rgba(0,0,0,0.012), rgba(0,0,0,0.04));
      pointer-events: none;
      z-index: 30;
    }

    .turn-next {
      transform-origin: left bottom;
      animation: turnNext 0.52s cubic-bezier(0.22, 0.78, 0.22, 1) forwards;
      z-index: 20;
    }

    .turn-prev {
      transform-origin: right bottom;
      animation: turnPrev 0.52s cubic-bezier(0.22, 0.78, 0.22, 1) forwards;
      z-index: 20;
    }

    .turn-next::after,
    .turn-prev::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .turn-next::after {
      background: linear-gradient(to left, rgba(0,0,0,0.12), rgba(255,255,255,0.04) 35%, rgba(255,255,255,0) 58%);
    }

    .turn-prev::after {
      background: linear-gradient(to right, rgba(0,0,0,0.12), rgba(255,255,255,0.04) 35%, rgba(255,255,255,0) 58%);
    }

    @keyframes turnNext {
      0% { transform: rotateY(0deg); filter: brightness(1); }
      35% { transform: rotateY(-28deg); filter: brightness(0.985); }
      100% { transform: rotateY(-178deg); filter: brightness(0.92); }
    }

    @keyframes turnPrev {
      0% { transform: rotateY(0deg); filter: brightness(1); }
      35% { transform: rotateY(28deg); filter: brightness(0.985); }
      100% { transform: rotateY(178deg); filter: brightness(0.92); }
    }

    .nav-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px 16px;
      background: #101012;
      border-top: 1px solid #1d1d20;
      flex-wrap: wrap;
    }

    .range-wrap {
      flex: 1;
      min-width: 220px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #d7d7d7;
    }

    .mini-info {
      color: #aaa;
      font-size: 13px;
      white-space: nowrap;
    }

    .hint {
      text-align: center;
      color: #8f8f94;
      padding: 0 14px 16px;
      background: #101012;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .spread {
        display: block;
      }

      .page-shell {
        width: min(88vw, 440px);
      }

      .page-shell.left,
      .gutter {
        display: none;
      }

      .page-shell.right {
        border-radius: 18px;
      }

      .viewer-wrap {
        padding: 16px 8px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <input id="pdfUrl" type="text" placeholder="PDF 링크를 입력하세요" value="sample4.pdf" />
    <button id="loadBtn">불러오기</button>
    <button id="firstBtn" class="secondary">처음</button>
    <button id="prevBtn" class="secondary">이전</button>
    <button id="nextBtn" class="secondary">다음</button>
    <button id="lastBtn" class="secondary">끝</button>
    <input id="jumpInput" type="number" min="1" step="1" placeholder="페이지" />
    <button id="jumpBtn" class="secondary">이동</button>
  </div>

  <div class="status" id="status">PDF 링크를 넣고 불러오기를 누르세요.</div>

  <div class="viewer-wrap">
    <div class="book">
      <div class="spread">
        <div class="page-shell left" id="leftShell">
          <div class="page-layer" id="leftCurrent"><div class="placeholder">왼쪽 페이지</div></div>
          <div class="page-layer" id="leftNext" style="display:none"></div>
        </div>
        <div class="gutter"></div>
        <div class="page-shell right" id="rightShell">
          <div class="page-layer" id="rightCurrent"><div class="placeholder">오른쪽 페이지</div></div>
          <div class="page-layer" id="rightNext" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="nav-bar">
    <div class="range-wrap">
      <span class="mini-info">빠른 이동</span>
      <input id="pageSlider" type="range" min="1" max="1" step="1" value="1" />
      <span class="mini-info" id="spreadInfo">1</span>
    </div>
  </div>

  <div class="hint">데스크톱은 양면, 모바일은 한 페이지 보기로 동작합니다.</div>

  <script type="module">
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs';

    const TURN_DURATION = 520;
    const STATIC_SWAP_RATIO = 1;
    const FINAL_SWAP_OFFSET = 0;

    const pdfUrlInput = document.getElementById('pdfUrl');
    const loadBtn = document.getElementById('loadBtn');
    const firstBtn = document.getElementById('firstBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const lastBtn = document.getElementById('lastBtn');
    const jumpInput = document.getElementById('jumpInput');
    const jumpBtn = document.getElementById('jumpBtn');
    const pageSlider = document.getElementById('pageSlider');
    const spreadInfo = document.getElementById('spreadInfo');
    const status = document.getElementById('status');

    const leftCurrent = document.getElementById('leftCurrent');
    const leftNext = document.getElementById('leftNext');
    const rightCurrent = document.getElementById('rightCurrent');
    const rightNext = document.getElementById('rightNext');

    let pdfDoc = null;
    let currentStart = 1;
    let isAnimating = false;
    let renderToken = 0;
    const cache = new Map();

    function isMobile() {
      return window.matchMedia('(max-width: 900px)').matches;
    }

    function setStatus(text) {
      status.textContent = text;
    }

    function clearLayer(layer, label) {
      layer.innerHTML = label ? `<div class="placeholder">${label}</div>` : '';
    }

    function copyLayerContent(fromLayer, toLayer) {
      toLayer.innerHTML = '';

      const sourceCanvas = fromLayer.querySelector('canvas');
      if (sourceCanvas) {
        toLayer.appendChild(cloneCanvas(sourceCanvas));
      } else {
        const placeholder = fromLayer.querySelector('.placeholder');
        if (placeholder) {
          toLayer.appendChild(placeholder.cloneNode(true));
        }
      }

      const pageNumber = fromLayer.querySelector('.page-number');
      if (pageNumber) {
        toLayer.appendChild(pageNumber.cloneNode(true));
      }
    }

    function cloneCanvas(sourceCanvas) {
      const canvas = document.createElement('canvas');
      canvas.width = sourceCanvas.width;
      canvas.height = sourceCanvas.height;
      canvas.getContext('2d').drawImage(sourceCanvas, 0, 0);
      return canvas;
    }

    function fillLayer(layer, sourceCanvas, pageNumber, side) {
      layer.innerHTML = '';
      if (!sourceCanvas) {
        clearLayer(layer, '빈 페이지');
        return;
      }
      layer.appendChild(cloneCanvas(sourceCanvas));
      const pageNumberEl = document.createElement('div');
      pageNumberEl.className = 'page-number';
      pageNumberEl.textContent = String(pageNumber);
      layer.classList.remove('left', 'right');
      layer.classList.add(side);
      layer.appendChild(pageNumberEl);
    }

    function normalizeStart(page) {
      const n = Math.max(1, Number(page) || 1);
      if (isMobile()) return n;
      return n % 2 === 0 ? n - 1 : n;
    }

    function getLastStart() {
      if (!pdfDoc) return 1;
      if (isMobile()) return pdfDoc.numPages;
      return pdfDoc.numPages % 2 === 0 ? pdfDoc.numPages - 1 : pdfDoc.numPages;
    }

    function clampStart(page) {
      return Math.min(getLastStart(), Math.max(1, normalizeStart(page)));
    }

    function getStep() {
      return isMobile() ? 1 : 2;
    }

    async function getPageCanvas(pageNumber) {
      if (!pdfDoc || pageNumber < 1 || pageNumber > pdfDoc.numPages) return null;
      const key = `${isMobile() ? 'm' : 'd'}-${pageNumber}`;
      if (cache.has(key)) return cache.get(key);

      const page = await pdfDoc.getPage(pageNumber);
      const baseViewport = page.getViewport({ scale: 1 });
      const targetWidth = isMobile() ? 1400 : 1100;
      const scale = targetWidth / baseViewport.width;
      const viewport = page.getViewport({ scale });

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: ctx, viewport }).promise;
      cache.set(key, canvas);
      return canvas;
    }

    async function renderIntoLayers(start, leftLayer, rightLayer) {
      if (isMobile()) {
        const canvas = await getPageCanvas(start);
        clearLayer(leftLayer, '');
        fillLayer(rightLayer, canvas, start, 'right');
      } else {
        const [leftCanvas, rightCanvas] = await Promise.all([
          getPageCanvas(start),
          getPageCanvas(start + 1)
        ]);
        fillLayer(leftLayer, leftCanvas, start, 'left');
        fillLayer(rightLayer, rightCanvas, start + 1, 'right');
      }
    }

    async function preloadAround(start) {
      if (!pdfDoc) return;
      const step = getStep();
      const pages = isMobile()
        ? [start, start + 1, start - 1]
        : [start, start + 1, start + 2, start + 3, start - 2, start - 1];
      await Promise.allSettled(
        pages.filter((p) => p >= 1 && p <= pdfDoc.numPages).map((p) => getPageCanvas(p))
      );
    }

    function updateUi() {
      if (!pdfDoc) return;
      pageSlider.max = String(getLastStart());
      pageSlider.step = String(getStep());
      pageSlider.value = String(currentStart);
      jumpInput.max = String(pdfDoc.numPages);

      if (isMobile()) {
        setStatus(`총 ${pdfDoc.numPages}페이지 중 ${currentStart}페이지 표시 중`);
        spreadInfo.textContent = String(currentStart);
      } else {
        setStatus(`총 ${pdfDoc.numPages}페이지 중 ${currentStart}-${Math.min(currentStart + 1, pdfDoc.numPages)}페이지 표시 중`);
        spreadInfo.textContent = `${currentStart}-${Math.min(currentStart + 1, pdfDoc.numPages)}`;
      }
    }

    async function showStart(start) {
      await renderIntoLayers(start, leftCurrent, rightCurrent);
      updateUi();
    }

    async function loadPdf(url) {
      try {
        renderToken += 1;
        const myToken = renderToken;
        cache.clear();
        setStatus('PDF 불러오는 중...');
        const loadingTask = pdfjsLib.getDocument(url);
        pdfDoc = await loadingTask.promise;
        currentStart = 1;
        await preloadAround(currentStart);
        if (myToken !== renderToken) return;
        await showStart(currentStart);
      } catch (err) {
        console.error(err);
        setStatus('PDF를 불러오지 못했습니다. 링크나 파일 경로를 다시 확인해주세요.');
        clearLayer(leftCurrent, '로드 실패');
        clearLayer(rightCurrent, '로드 실패');
      }
    }

    async function goTo(target, directionHint = null) {
      if (!pdfDoc || isAnimating) return;
      const nextStart = clampStart(target);
      if (nextStart === currentStart) return;

      const direction = directionHint || (nextStart > currentStart ? 'next' : 'prev');
      isAnimating = true;

      await preloadAround(nextStart);
      await renderIntoLayers(nextStart, leftNext, rightNext);

      const mobile = isMobile();
      const animatedLayer = mobile ? rightCurrent : (direction === 'next' ? rightCurrent : leftCurrent);
      const incomingLayer = mobile ? rightNext : (direction === 'next' ? rightNext : leftNext);
      const otherCurrent = mobile ? null : (direction === 'next' ? leftCurrent : rightCurrent);
      const otherIncoming = mobile ? null : (direction === 'next' ? leftNext : rightNext);

      leftNext.style.display = mobile ? 'none' : 'block';
      rightNext.style.display = 'block';

      // 정지해 있는 반대편 페이지는 넘김 도중에는 유지하고,
      // 애니메이션이 끝나는 시점에만 교체한다.

      animatedLayer.classList.remove('turn-next', 'turn-prev');
      void animatedLayer.offsetWidth;
      animatedLayer.classList.add(direction === 'next' ? 'turn-next' : 'turn-prev');

      window.setTimeout(() => {
        currentStart = nextStart;
        if (!mobile && otherCurrent && otherIncoming) {
          copyLayerContent(otherIncoming, otherCurrent);
        }
        copyLayerContent(leftNext, leftCurrent);
        copyLayerContent(rightNext, rightCurrent);
        animatedLayer.classList.remove('turn-next', 'turn-prev');
        leftNext.style.display = 'none';
        rightNext.style.display = 'none';
        updateUi();
        isAnimating = false;
      }, TURN_DURATION);
    }

    loadBtn.addEventListener('click', () => {
      const url = pdfUrlInput.value.trim();
      if (!url) {
        setStatus('PDF 링크를 먼저 입력해주세요.');
        return;
      }
      loadPdf(url);
    });

    firstBtn.addEventListener('click', () => goTo(1, 'prev'));
    prevBtn.addEventListener('click', () => goTo(currentStart - getStep(), 'prev'));
    nextBtn.addEventListener('click', () => goTo(currentStart + getStep(), 'next'));
    lastBtn.addEventListener('click', () => goTo(getLastStart(), 'next'));
    jumpBtn.addEventListener('click', () => goTo(Number(jumpInput.value), Number(jumpInput.value) > currentStart ? 'next' : 'prev'));
    jumpInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') jumpBtn.click();
    });

    pageSlider.addEventListener('input', () => {
      const value = Number(pageSlider.value);
      if (isMobile()) {
        spreadInfo.textContent = String(value);
      } else {
        const start = normalizeStart(value);
        spreadInfo.textContent = `${start}-${Math.min(start + 1, pdfDoc?.numPages || 1)}`;
      }
    });

    pageSlider.addEventListener('change', () => {
      const value = Number(pageSlider.value);
      goTo(value, value > currentStart ? 'next' : 'prev');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') goTo(currentStart + getStep(), 'next');
      if (e.key === 'ArrowLeft') goTo(currentStart - getStep(), 'prev');
    });

    let resizeTimer = null;
    window.addEventListener('resize', () => {
      if (!pdfDoc) return;
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(async () => {
        cache.clear();
        currentStart = clampStart(currentStart);
        await preloadAround(currentStart);
        await showStart(currentStart);
      }, 120);
    });

    const params = new URLSearchParams(window.location.search);
    const pdfFromQuery = params.get('pdf');
    if (pdfFromQuery) {
      pdfUrlInput.value = pdfFromQuery;
      loadPdf(pdfFromQuery);
    }
  </script>
</body>
</html>
