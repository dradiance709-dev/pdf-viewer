<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Flip Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 12px;
      background: #1b1b1b;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
    }

    .toolbar input {
      flex: 1;
      min-width: 280px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
    }

    .toolbar button {
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      background: #fff;
      color: #111;
      font-weight: 600;
      cursor: pointer;
    }

    .toolbar button.secondary {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
    }

    .status {
      padding: 8px 12px;
      font-size: 14px;
      color: #bbb;
      background: #151515;
      border-bottom: 1px solid #222;
    }

    .viewer-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: auto;
    }

    .book {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      perspective: 2400px;
    }

    .spread {
      position: relative;
      display: flex;
      gap: 0;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      transform-style: preserve-3d;
      isolation: isolate;
    }

    .page-stack {
      position: relative;
      width: min(42vw, 520px);
      aspect-ratio: 0.707 / 1;
      overflow: visible;
    }

    .gutter-shadow {
      position: absolute;
      left: 50%;
      top: 0;
      width: 24px;
      height: 100%;
      transform: translateX(-50%);
      background: linear-gradient(to right, rgba(0,0,0,0.16), rgba(0,0,0,0.03), rgba(0,0,0,0.16));
      z-index: 6;
      pointer-events: none;
    }

    .page {
      width: 100%;
      height: 100%;
      background: #fff;
      position: absolute;
      inset: 0;
      overflow: hidden;
      border: 1px solid #ccc;
      backface-visibility: hidden;
      transform-style: preserve-3d;
    }

    .page.current {
      z-index: 3;
    }

    .page.under {
      z-index: 1;
      background: #fdfdfd;
    }

    .page.left {
      border-radius: 12px 0 0 12px;
      transform-origin: right center;
    }

    .page.right {
      border-radius: 0 12px 12px 0;
      transform-origin: left center;
    }

    .page.turning-next {
      z-index: 12;
      animation: pageTurnNext 0.9s cubic-bezier(0.22, 0.7, 0.2, 1) forwards;
    }

    .page.turning-prev {
      z-index: 12;
      animation: pageTurnPrev 0.9s cubic-bezier(0.22, 0.7, 0.2, 1) forwards;
    }

    .page.turning-next::before,
    .page.turning-prev::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }

    .page.turning-next::after,
    .page.turning-prev::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 5;
      width: 46%;
      height: 46%;
      bottom: -4%;
      filter: blur(10px);
      opacity: 0.36;
    }

    .page.turning-next::before {
      background:
        radial-gradient(circle at 100% 100%, rgba(255,255,255,0.06) 0 18%, rgba(255,255,255,0) 28%),
        linear-gradient(to left, rgba(0,0,0,0.18), rgba(0,0,0,0.02) 18%, rgba(255,255,255,0.04) 42%, rgba(255,255,255,0) 60%);
      clip-path: polygon(100% 100%, 66% 100%, 100% 66%);
      animation: cornerLiftRight 0.9s ease forwards;
      transform-origin: 100% 100%;
    }

    .page.turning-next::after {
      right: -8%;
      background: radial-gradient(circle at 80% 80%, rgba(0,0,0,0.42), rgba(0,0,0,0.04) 60%, rgba(0,0,0,0) 72%);
      animation: shadowSweepRight 0.9s ease forwards;
    }

    .page.turning-prev::before {
      background:
        radial-gradient(circle at 0% 100%, rgba(255,255,255,0.06) 0 18%, rgba(255,255,255,0) 28%),
        linear-gradient(to right, rgba(0,0,0,0.18), rgba(0,0,0,0.02) 18%, rgba(255,255,255,0.04) 42%, rgba(255,255,255,0) 60%);
      clip-path: polygon(0 100%, 34% 100%, 0 66%);
      animation: cornerLiftLeft 0.9s ease forwards;
      transform-origin: 0 100%;
    }

    .page.turning-prev::after {
      left: -8%;
      background: radial-gradient(circle at 20% 80%, rgba(0,0,0,0.42), rgba(0,0,0,0.04) 60%, rgba(0,0,0,0) 72%);
      animation: shadowSweepLeft 0.9s ease forwards;
    }

    @keyframes pageTurnNext {
      0% {
        transform: rotateY(0deg) skewY(0deg);
        filter: brightness(1);
      }
      20% {
        transform: rotateY(-12deg) skewY(1.4deg);
        filter: brightness(0.98);
      }
      55% {
        transform: rotateY(-78deg) skewY(1deg);
        filter: brightness(0.92);
      }
      100% {
        transform: rotateY(-168deg) skewY(0deg);
        filter: brightness(0.88);
      }
    }

    @keyframes pageTurnPrev {
      0% {
        transform: rotateY(0deg) skewY(0deg);
        filter: brightness(1);
      }
      20% {
        transform: rotateY(12deg) skewY(-1.4deg);
        filter: brightness(0.98);
      }
      55% {
        transform: rotateY(78deg) skewY(-1deg);
        filter: brightness(0.92);
      }
      100% {
        transform: rotateY(168deg) skewY(0deg);
        filter: brightness(0.88);
      }
    }

    @keyframes cornerLiftRight {
      0% {
        clip-path: polygon(100% 100%, 78% 100%, 100% 78%);
        opacity: 0.12;
      }
      40% {
        clip-path: polygon(100% 100%, 44% 100%, 100% 42%);
        opacity: 0.34;
      }
      100% {
        clip-path: polygon(100% 100%, 18% 100%, 100% 18%);
        opacity: 0.18;
      }
    }

    @keyframes cornerLiftLeft {
      0% {
        clip-path: polygon(0 100%, 22% 100%, 0 78%);
        opacity: 0.12;
      }
      40% {
        clip-path: polygon(0 100%, 56% 100%, 0 42%);
        opacity: 0.34;
      }
      100% {
        clip-path: polygon(0 100%, 82% 100%, 0 18%);
        opacity: 0.18;
      }
    }

    @keyframes shadowSweepRight {
      0% { transform: translate(0, 0) scale(0.6); opacity: 0.16; }
      45% { transform: translate(-22%, -10%) scale(1); opacity: 0.42; }
      100% { transform: translate(-34%, -14%) scale(1.12); opacity: 0.14; }
    }

    @keyframes shadowSweepLeft {
      0% { transform: translate(0, 0) scale(0.6); opacity: 0.16; }
      45% { transform: translate(22%, -10%) scale(1); opacity: 0.42; }
      100% { transform: translate(34%, -14%) scale(1.12); opacity: 0.14; }
    }

    .page canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
    }

    .page-number {
      position: absolute;
      bottom: 10px;
      font-size: 12px;
      color: #666;
      background: rgba(255,255,255,0.8);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .left .page-number { left: 10px; }
    .right .page-number { right: 10px; }

    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #888;
      font-size: 14px;
      background:
        linear-gradient(135deg, #f6f6f6 25%, #fbfbfb 25%, #fbfbfb 50%, #f6f6f6 50%, #f6f6f6 75%, #fbfbfb 75%, #fbfbfb 100%);
      background-size: 24px 24px;
    }
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #888;
      font-size: 14px;
      background:
        linear-gradient(135deg, #f6f6f6 25%, #fbfbfb 25%, #fbfbfb 50%, #f6f6f6 50%, #f6f6f6 75%, #fbfbfb 75%, #fbfbfb 100%);
      background-size: 24px 24px;
    }

    .hint {
      text-align: center;
      padding: 12px;
      color: #999;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .page {
        width: min(44vw, 360px);
      }
      .viewer-wrap {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <input id="pdfUrl" type="text" placeholder="PDF 링크를 입력하세요" />
    <button id="loadBtn">불러오기</button>
    <button id="prevBtn" class="secondary">이전</button>
    <button id="nextBtn" class="secondary">다음</button>
  </div>

  <div class="status" id="status">PDF 링크를 넣고 불러오기를 누르세요.</div>

  <div class="viewer-wrap">
    <div>
      <div class="book">
        <div class="spread" id="spread">
          <div class="page-stack left-stack">
            <div class="page under left" id="leftUnder">
              <div class="placeholder">왼쪽 페이지</div>
            </div>
            <div class="page current left" id="leftPage">
              <div class="placeholder">왼쪽 페이지</div>
            </div>
          </div>
          <div class="gutter-shadow"></div>
          <div class="page-stack right-stack">
            <div class="page under right" id="rightUnder">
              <div class="placeholder">오른쪽 페이지</div>
            </div>
            <div class="page current right" id="rightPage">
              <div class="placeholder">오른쪽 페이지</div>
            </div>
          </div>
        </div>
      </div>
      <div class="hint">좌우 두 페이지로 보고, 버튼이나 방향키로 넘길 수 있습니다.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs" type="module"></script>
  <script type="module">
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs';

    const pdfUrlInput = document.getElementById('pdfUrl');
    const loadBtn = document.getElementById('loadBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const leftPage = document.getElementById('leftPage');
    const rightPage = document.getElementById('rightPage');
    const status = document.getElementById('status');

    let pdfDoc = null;
    let currentSpreadStart = 1;
    let isAnimating = false;

    const leftUnder = document.getElementById('leftUnder');
    const rightUnder = document.getElementById('rightUnder');
    const spread = document.getElementById('spread');

    // 예시용 기본 링크. 실제 사용 시 여기 값을 바꾸거나 input에 넣으세요.
    pdfUrlInput.value = '';

    function setStatus(text) {
      status.textContent = text;
    }

    function clearPage(el, label) {
      el.innerHTML = `<div class="placeholder">${label}</div>`;
    }

    async function renderPage(pageNumber, container, side) {
      if (!pdfDoc || pageNumber < 1 || pageNumber > pdfDoc.numPages) {
        clearPage(container, side === 'left' ? '빈 페이지' : '빈 페이지');
        return;
      }

      const page = await pdfDoc.getPage(pageNumber);
      const viewport = page.getViewport({ scale: 1.6 });
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      container.innerHTML = '';
      container.appendChild(canvas);

      const pageNumberEl = document.createElement('div');
      pageNumberEl.className = 'page-number';
      pageNumberEl.textContent = `${pageNumber}`;
      container.appendChild(pageNumberEl);

      await page.render({
        canvasContext: context,
        viewport
      }).promise;
    }

    async function renderSpread(startPage, target = 'current') {
      if (!pdfDoc) return;

      const leftTarget = target === 'under' ? leftUnder : leftPage;
      const rightTarget = target === 'under' ? rightUnder : rightPage;

      if (target === 'current') {
        setStatus(`총 ${pdfDoc.numPages}페이지 중 ${startPage}-${Math.min(startPage + 1, pdfDoc.numPages)}페이지 표시 중`);
      }

      await Promise.all([
        renderPage(startPage, leftTarget, 'left'),
        renderPage(startPage + 1, rightTarget, 'right')
      ]);
    }페이지 중 ${startPage}-${Math.min(startPage + 1, pdfDoc.numPages)}페이지 표시 중`);
      await Promise.all([
        renderPage(startPage, leftPage, 'left'),
        renderPage(startPage + 1, rightPage, 'right')
      ]);
    }

    async function loadPdf(url) {
      try {
        setStatus('PDF 불러오는 중...');
        const loadingTask = pdfjsLib.getDocument(url);
        pdfDoc = await loadingTask.promise;
        currentSpreadStart = 1;
        await renderSpread(currentSpreadStart, 'current');
        await renderSpread(currentSpreadStart + 2 <= pdfDoc.numPages ? currentSpreadStart + 2 : currentSpreadStart, 'under');
      } catch (error) {
        console.error(error);
        setStatus('PDF를 불러오지 못했습니다. CORS 허용된 직접 PDF 링크인지 확인해주세요.');
        clearPage(leftPage, '로드 실패');
        clearPage(rightPage, '로드 실패');
      }
    }

    async function flip(direction) {
      if (!pdfDoc || isAnimating) return;

      const nextStart = direction === 'next'
        ? currentSpreadStart + 2
        : currentSpreadStart - 2;

      if (nextStart < 1 || nextStart > pdfDoc.numPages) return;

      isAnimating = true;
      spread.classList.add('is-turning');

      await renderSpread(nextStart, 'under');

      const animatedEl = direction === 'next' ? rightPage : leftPage;
      const className = direction === 'next' ? 'turning-next' : 'turning-prev';

      animatedEl.classList.remove('turning-next', 'turning-prev');
      void animatedEl.offsetWidth;
      animatedEl.classList.add(className);

      setTimeout(async () => {
        currentSpreadStart = nextStart;
        await renderSpread(currentSpreadStart, 'current');
        animatedEl.classList.remove('turning-next', 'turning-prev');
        leftUnder.innerHTML = leftPage.innerHTML;
        rightUnder.innerHTML = rightPage.innerHTML;
        spread.classList.remove('is-turning');
        isAnimating = false;
      }, 900);
    }

    loadBtn.addEventListener('click', () => {
      const url = pdfUrlInput.value.trim();
      if (!url) {
        setStatus('PDF 링크를 먼저 입력해주세요.');
        return;
      }
      loadPdf(url);
    });

    nextBtn.addEventListener('click', () => flip('next'));
    prevBtn.addEventListener('click', () => flip('prev'));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') flip('next');
      if (e.key === 'ArrowLeft') flip('prev');
    });
  </script>
</body>
</html>
